backend:
  name: git-gateway
  branch: main

media_folder: "uploads/images"
public_folder: "/uploads/images"

locale: id

collections:
  - name: "berita"
    label: "Berita & Kegiatan"
    folder: "_berita"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime", format: "DD MMMM YYYY", date_format: "DD MMMM YYYY", time_format: false }
      - label: "Kategori"
        name: "kategori"
        widget: "select"
        options: ["Kegiatan", "Program", "Pelatihan", "Pengumuman", "Berita"]
      - { label: "Foto", name: "foto", widget: "image", required: false, hint: "Upload foto untuk berita ini" }
      - { label: "Ringkasan", name: "ringkasan", widget: "text", hint: "Deskripsi singkat (maks 150 karakter)" }
      - { label: "Isi Berita", name: "body", widget: "markdown" }
      - { label: "Tampilkan sebagai Berita Utama", name: "featured", widget: "boolean", default: false }
      - { label: "Publikasikan", name: "published", widget: "boolean", default: true }
